<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sin conexi&oacute;n — Wasiyuq</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1B4332, #2D6A4F);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }
        .card { max-width: 400px; }
        .icon {
            font-size: 64px;
            margin-bottom: 1.5rem;
            display: block;
        }
        h1 { font-size: 1.5rem; margin-bottom: 0.75rem; }
        p { color: rgba(255,255,255,0.7); font-size: 0.95rem; line-height: 1.6; margin-bottom: 1.5rem; }
        button {
            background: #fff;
            color: #2D6A4F;
            border: none;
            border-radius: 12px;
            padding: 12px 28px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: rgba(255,255,255,0.9); }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">&#128247;</span>
        <h1>No tienes conexi&oacute;n</h1>
        <p>Parece que est&aacute;s sin internet. Revis&aacute; tu conexi&oacute;n y volv&eacute; a intentarlo.</p>
        <button onclick="location.reload()">Reintentar</button>
    </div>
</body>
</html>
